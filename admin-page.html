<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Premium Admin Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
            color: #fff;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(15px);
            padding: 25px 18px;
            border-right: 1px solid rgba(255, 255, 255, .08);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #38bdf8;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            margin-bottom: 12px;
            text-decoration: none;
            color: #fff;
            border-radius: 12px;
            transition: .3s;
            cursor: pointer;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #2563eb;
            transform: translateX(5px);
        }

        /* Main */
        .main {
            flex: 1;
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .topbar h2 {
            font-size: 28px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            transition: .3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        /* Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(14px);
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .card h1 {
            font-size: 34px;
            color: #fff;
        }

        /* Form */
        input,
        textarea {
            width: 100%;
            padding: 13px;
            margin-top: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: #1e293b;
            color: #fff;
        }

        textarea {
            height: 110px;
            resize: none;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 14px;
        }

        th {
            background: #1e293b;
            padding: 14px;
            text-align: left;
        }

        td {
            padding: 14px;
            background: rgba(255, 255, 255, .03);
            border-bottom: 1px solid rgba(255, 255, 255, .04);
        }

        .badge {
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .success {
            background: #16a34a;
        }

        .warning {
            background: #f59e0b;
        }

        .danger {
            background: #ef4444;
        }

        /* Pages */
        .page {
            display: none;
            animation: fade .4s ease;
        }

        .page.active {
            display: block;
        }

        .setting-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 18px;
        }

        .setting-row label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .setting-row p {
            font-size: 13px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: #1e293b;
            color: #fff;
        }

        @media(max-width:768px) {
            .setting-row {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:900px) {
            .sidebar {
                display: none;
            }

            body {
                display: block;
            }

            .main {
                padding: 15px;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo"> Admin</div>

        <a class="active" onclick="showPage('dashboard',this)">🏠 Dashboard</a>
        <a onclick="showPage('students',this)">
            🎓 Students
            <span id="reqBadge" style="
background:red;
color:white;
padding:2px 8px;
border-radius:20px;
font-size:12px;
margin-left:auto;
">0</span>
        </a>
        <a onclick="showPage('posts',this)">📝 Posts</a>
        <a onclick="showPage('settings',this)">⚙ Settings</a>

    </div>

    <!-- Main -->
    <div class="main">

        <div class="topbar">
            <h2>Welcome Admin 👋</h2>
            <button class="btn" onclick="logout()">Logout</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="page active">

            <div class="grid">

                <div class="card">
                    <h3>Total Students</h3>
                    <h1 id="studentsCount">0</h1>
                </div>

                <div class="card">
                    <h3>Total Posts</h3>
                    <h1 id="postsCount">0</h1>
                </div>

                <div class="card">
                    <h3>Total Likes</h3>
                    <h1 id="likesCount">0</h1>
                </div>

                <div class="card">
                    <h3>System Status</h3>
                    <h1 style="font-size:20px;color:#22c55e;">Online</h1>
                </div>

            </div>

        </div>

        <!-- Students -->
        <div id="students" class="page">

            <div class="card">
                <h2>Add Student</h2>

                <input id="studentName" placeholder="Student Name">
                <input id="studentEmail" type="email" placeholder="Student Email">
                <input id="studentPassword" type="password" placeholder="Password">
                <input id="studentConfirmPassword" type="password" placeholder="Confirm Password">
                <button class="btn" style="margin-top:15px;" onclick="addStudent()">
                    Add Student
                </button>

                <table id="studentTable">
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Password</th>
                        <th>Created Date</th>
                        <th>Action</th>
                    </tr>
                </table>

            </div>
        </div>

        <!-- Posts -->
        <div id="posts" class="page">

            <div class="card">
                <h2>Create Post</h2>

                <input id="postTitle" placeholder="Post Title">
                <textarea id="postContent" placeholder="Post Content"></textarea>
                <button class="btn" style="margin-top:15px;" onclick="addPost()">Create Post</button>

                <table id="postTable">
                    <tr>
                        <th>Title</th>
                        <th>Action</th>
                    </tr>
                </table>

            </div>
        </div>

        <!-- Settings -->
        <div id="settings" class="page">
            <div class="card">
                <h2>Settings</h2>
                <!-- ADMIN SETTINGS CARD -->
                <h2>👤 Profile Settings</h2>

                <input type="text" id="adminName" placeholder="Admin Name">

                <input type="email" id="adminEmail" placeholder="Email Address">

                <hr style="margin:20px 0;border:1px solid rgba(255,255,255,.08);">

                <h3 style="margin-bottom:10px;">🔒 Change Password</h3>

                <div style="position:relative;margin-bottom:12px;">
                    <input type="password" id="currentPass" placeholder="Current Password">
                    <span onclick="togglePass('currentPass')"
                        style="position:absolute;right:15px;top:13px;cursor:pointer;">👁</span>
                </div>

                <div style="position:relative;margin-bottom:12px;">
                    <input type="password" id="newPass" placeholder="New Password">
                    <span onclick="togglePass('newPass')"
                        style="position:absolute;right:15px;top:13px;cursor:pointer;">👁</span>
                </div>

                <div style="position:relative;margin-bottom:15px;">
                    <input type="password" id="confirmPass" placeholder="Confirm New Password">
                    <span onclick="togglePass('confirmPass')"
                        style="position:absolute;right:15px;top:13px;cursor:pointer;">👁</span>
                </div>

                <button class="btn" onclick="saveAdminSettings()">
                    Update Profile
                </button>

            </div>
        </div>
        <script>
            // CLEAN FULL SCRIPT (replace all old <script> code)

            // Security Check
            if (localStorage.getItem("loggedRole") !== "Admin") {
                location.href = "index.html";
            }

            // Page Load
            window.onload = function () {
                loadDashboard();
            };

            // Sidebar Navigation
            function showPage(id, el) {

                document.querySelectorAll(".page").forEach(page => {
                    page.classList.remove("active");
                });

                document.querySelectorAll(".sidebar a").forEach(link => {
                    link.classList.remove("active");
                });

                document.getElementById(id).classList.add("active");
                el.classList.add("active");
            }

            // Dashboard Load
            function loadDashboard() {
                updateCounts();
                loadStudents();
                loadPosts();
                updateRequestBadge();
            }

            // Update Dashboard Counts
            function updateCounts() {

                let users = JSON.parse(localStorage.getItem("users")) || [];
                let posts = JSON.parse(localStorage.getItem("posts")) || [];

                let students = users.filter(user => user.role === "User");

                let totalLikes = 0;

                posts.forEach(post => {
                    totalLikes += post.likes || 0;
                });

                document.getElementById("studentsCount").innerText = students.length;
                document.getElementById("postsCount").innerText = posts.length;
                document.getElementById("likesCount").innerText = totalLikes;
            }

            // Load Students
            function loadStudents() {

                let users = JSON.parse(localStorage.getItem("users")) || [];
                let requests = JSON.parse(localStorage.getItem("passwordRequests")) || [];

                let table = document.getElementById("studentTable");

                table.innerHTML = `
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Password</th>
        <th>Created</th>
        <th>Request</th>
        <th>Action</th>
    </tr>
    `;

                users.forEach((user, index) => {

                    if (user.role !== "User") return;

                    let req = requests.find(r =>
                        r.user === user.username &&
                        r.status === "Unread"
                    );

                    let requestText =
                        req ? "🔔 Request" : "No Request";

                    let actionBtn = req
                        ? `<button class="btn"
            onclick="approvePassword('${user.username}')">
            View
           </button>`
                        : `<button class="btn"
            onclick="editUser(${index})">
            Edit
           </button>
           <button class="btn"
            onclick="deleteUser(${index})">
            Delete
           </button>`;

                    table.innerHTML += `
        <tr>
            <td>${user.username}</td>
            <td>${user.email || "-"}</td>

            <td>
                <span id="pass${index}">******</span>
                <button class="btn"
                style="padding:5px 10px;margin-left:8px;"
                onclick="togglePassword(${index},'${user.password}')">
                👁
                </button>
            </td>

            <td>${user.created || "-"}</td>
            <td>${requestText}</td>
            <td>${actionBtn}</td>
        </tr>
        `;
                });
            }

            // Show / Hide Password
            function togglePassword(i, pass) {

                let box = document.getElementById("pass" + i);

                if (box.innerText === "******") {
                    box.innerText = pass;
                } else {
                    box.innerText = "******";
                }
            }

            // Add Student
            function addStudent() {

                let name = document.getElementById("studentName").value.trim();
                let email = document.getElementById("studentEmail").value.trim();
                let password = document.getElementById("studentPassword").value.trim();
                let confirm = document.getElementById("studentConfirmPassword").value.trim();

                if (!name || !email || !password || !confirm) {
                    alert("Fill all fields");
                    return;
                }

                if (password !== confirm) {
                    alert("Passwords do not match");
                    return;
                }

                let users = JSON.parse(localStorage.getItem("users")) || [];

                users.push({
                    username: name,
                    email: email,
                    password: password,
                    role: "User",
                    created: new Date().toLocaleDateString()
                });

                localStorage.setItem("users", JSON.stringify(users));

                document.getElementById("studentName").value = "";
                document.getElementById("studentEmail").value = "";
                document.getElementById("studentPassword").value = "";
                document.getElementById("studentConfirmPassword").value = "";

                loadDashboard();
            }

            // Edit User
            function editUser(i) {

                let users = JSON.parse(localStorage.getItem("users")) || [];

                let newName = prompt("Enter Username", users[i].username);
                let newPass = prompt("Enter Password", users[i].password);

                if (!newName || !newPass) return;

                users[i].username = newName;
                users[i].password = newPass;

                localStorage.setItem("users", JSON.stringify(users));

                loadStudents();
            }

            // Delete User
            function deleteUser(i) {

                let users = JSON.parse(localStorage.getItem("users")) || [];

                users.splice(i, 1);

                localStorage.setItem("users", JSON.stringify(users));

                loadDashboard();
            }

            // Load Posts
            function loadPosts() {

                let posts = JSON.parse(localStorage.getItem("posts")) || [];
                let table = document.getElementById("postTable");

                table.innerHTML = `
    <tr>
        <th>User</th>
        <th>Post</th>
        <th>Likes</th>
        <th>Action</th>
    </tr>
    `;

                posts.forEach((post, i) => {

                    table.innerHTML += `
        <tr>
            <td>${post.name}</td>
            <td>${post.text}</td>
            <td>${post.likes}</td>
            <td>
                <button class="btn"
                onclick="deletePost(${i})">
                Delete
                </button>
            </td>
        </tr>
        `;
                });
            }

            // Add Post
            function addPost() {

                let title = document.getElementById("postTitle").value.trim();
                let content = document.getElementById("postContent").value.trim();

                if (!title) {
                    alert("Enter title");
                    return;
                }

                let posts = JSON.parse(localStorage.getItem("posts")) || [];

                posts.unshift({
                    name: "Admin",
                    text: title + " - " + content,
                    likes: 0,
                    dislikes: 0,
                    comments: []
                });

                localStorage.setItem("posts", JSON.stringify(posts));

                document.getElementById("postTitle").value = "";
                document.getElementById("postContent").value = "";

                loadDashboard();
            }

            // Delete Post
            function deletePost(i) {

                let posts = JSON.parse(localStorage.getItem("posts")) || [];

                posts.splice(i, 1);

                localStorage.setItem("posts", JSON.stringify(posts));

                loadDashboard();
            }

            // Badge Count
            function updateRequestBadge() {

                let requests =
                    JSON.parse(localStorage.getItem("passwordRequests")) || [];

                let unread =
                    requests.filter(r =>
                        r.status === "Unread"
                    ).length;

                let badge =
                    document.getElementById("reqBadge");

                if (unread > 0) {
                    badge.style.display = "inline-block";
                    badge.innerText = unread;
                } else {
                    badge.style.display = "none";
                }
            }

            // Approve Password Request
            function approvePassword(username) {

                let users =
                    JSON.parse(localStorage.getItem("users")) || [];

                let requests =
                    JSON.parse(localStorage.getItem("passwordRequests")) || [];

                let req = requests.find(r =>
                    r.user === username &&
                    r.status === "Unread"
                );

                if (!req) return;

                let ok = confirm(
                    "🔔 Password Request\n\n" +
                    "User: " + username +
                    "\nNew Password: " + req.password +
                    "\n\nApprove?"
                );

                if (!ok) return;

                users.forEach(user => {
                    if (user.username === username) {
                        user.password = req.password;
                    }
                });

                req.status = "Approved";

                localStorage.setItem("users", JSON.stringify(users));
                localStorage.setItem("passwordRequests", JSON.stringify(requests));

                loadDashboard();
            }

            // Logout
            function logout() {
                localStorage.removeItem("loggedUser");
                localStorage.removeItem("loggedRole");
                location.href = "index.html";
            }
        </script>

</body>

</html>
